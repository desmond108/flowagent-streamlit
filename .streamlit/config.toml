# Navy/gold theme to match the FlowAgent deck styling.
[theme]
base = "dark"
primaryColor = "#C2410C"
backgroundColor = "#0A1628"
secondaryBackgroundColor = "#0F2044"
textColor = "#FFFFFF"

[server]
maxUploadSize = 25

[client]
# Hide the developer toolbar (GitHub source, fork, edit-in-Codespaces pencil,
# rerun/settings menu) so customers get a clean, read-only view.
toolbarMode = "minimal"
